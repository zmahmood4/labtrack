name: LabTrack Slack Notify

on:
  repository_dispatch:
    types: [labtrack-event]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack message to both channels
        run: |
          TEXT='${{ github.event.client_payload.text }}'
          EMERGENCY='${{ github.event.client_payload.emergency }}'
          MANAGER='${{ secrets.MANAGER_HANDLE }}'

          if [ "$EMERGENCY" = "true" ]; then
            MESSAGE="🚨 *EMERGENCY ALERT*\n${TEXT}\n${MANAGER} please respond immediately."
            EMOJI=":rotating_light:"
          else
            MESSAGE="${TEXT}"
            EMOJI=":zap:"
          fi

          PAYLOAD="{\"text\": \"${MESSAGE}\", \"username\": \"ev.energy LabTrack\", \"icon_emoji\": \"${EMOJI}\"}"

          # Post to lab-presence channel
          curl -s -o /dev/null -X POST \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK }}"

          # Post to hardware-connectivity channel
          curl -s -o /dev/null -X POST \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK_HARDWARE }}"
